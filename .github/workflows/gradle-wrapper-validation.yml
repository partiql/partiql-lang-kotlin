name: "Validate Gradle Wrapper"
on:
  push:
    branches:
      - main     # Triggers only when code is merged into main
  pull_request:  # Triggers for any PR creation or update

permissions:
  contents: read

jobs:
  validation:
    name: "Gradle wrapper validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4
